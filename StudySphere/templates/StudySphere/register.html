{% extends "StudySphere/layout.html" %}
{% block title %}Register {% endblock %}

{% block body %}

<div class="d-flex pt-5 flex-column align-content-centre">

    <div class="align-self-center text-center rounded px-1">

        <h2 class="text-center title mb-3">Register</h2>

        {% for message in messages %}
            <div class="alert {{ message.tags }}" role="alert">
                {{ message }}
            </div>
        {% endfor %}

        <form action="{% url 'register' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <input class="form-control my-2"  type="text" name="username" placeholder="Username">
            </div>
            <div class="form-group">
                <input class="form-control my-2" type="text" name="first_name" placeholder="First name" required> 
            </div>
            <div class="form-group">
                <input class="form-control my-2" type="text" name="last_name" placeholder="Surname" required>
            </div>
            <div class="form-group">
                <input class="form-control my-2" type="email" name="email" placeholder="Email Address">
            </div>
            <div class="form-group">
                <input class="form-control my-2" type="password" name="password" placeholder="Password">
            </div>
            <div class="form-group">
                <input class="form-control my-2" type="password" name="confirmation" placeholder="Confirm Password">
            </div>
            <input class="btn btn-primary w-100 my-2" type="submit" value="Register">
        </form>

        <small>Already have an account? <a href="{% url 'login' %}">Login here.</a></small>
    </div>
    
</div>
{% endblock %}
