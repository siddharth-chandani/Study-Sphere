{% extends "StudySphere/layout.html" %}
{% load static %}
{% block title %}Login {% endblock %}

{% block body %}

    

<div class="d-flex  flex-column align-content-center justify-content-center">
        
    <div class="align-self-center text-center py-5 px-3 px-sm-4 px-md-5">
        <img src="{% static 'StudySphere/images/login.png' %}" alt="" class="pe-2 login-icon">
        <h2 class="text-center title pb-3">Login</h2>

        {% for message in messages %}
                <div class="alert {{ message.tags }}" role="alert">
                    {{ message }}
                </div>
        {% endfor %}

        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <input  class="form-control mb-3" type="text" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input class="form-control my-2" type="password" name="password" placeholder="Password" required>
            </div>
            <input class="btn btn-lg btn-primary btn-block mt-2 mb-2 w-100" type="submit" value="Login">
        </form>

        <small>Don't have an account? <a class="text-decoration-none" href="{% url 'register' %}">Register as a student here.</a></small>
    </div>

</div>
{% endblock %}
